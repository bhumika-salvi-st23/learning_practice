<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>

<body>
    <h2>Student registrartion form </h2>
    <form action="#" method="post">
        <fieldset>
            <legend>Personal information</legend>
            <label for="full-name">Name :</label>
            <input type="text" id="full-name" name="full-name" required><br><br>

            <label for="email">Email :</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="age">Age :</label>
            <input type="number" id="age" name="age" min="1" max="100" required><br><br>
        </fieldset>

        <br>
        <fieldset>
            <legend>Gender (Radio Buttons)</legend>

            <label><input type="radio" name="gender" value="male" required> Male</label><br>
            <label><input type="radio" name="gender" value="female"> Female</label><br>
            <label><input type="radio" name="gender" value="other"> Other</label>

        </fieldset>

        <br>

        <fieldset>
            <legend>Hobbies (Checkboxes)</legend>

            <label><input type="checkbox" name="hobby" value="sports"> Sports</label><br>
            <label><input type="checkbox" name="hobby" value="music"> Music</label><br>
            <label><input type="checkbox" name="hobby" value="reading"> Reading</label>

        </fieldset>

        <br>

        <fieldset>
            <legend>Media Access</legend>

            <!-- Camera -->
            <label>Upload Photo (Camera):</label><br>
            <input type="file" accept="image/*" capture="camera"><br><br>

            <!-- Microphone -->
            <label>Record Audio (Microphone):</label><br>
            <input type="file" accept="audio/*" capture="microphone">

        </fieldset>

        <br>

        <!-- Submit -->
        <input type="submit" value="Submit Form">

    </form>


</body>

</html>
