<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Shadow DOM Example</title>
</head>

<body>

  <h2>Main Page Title (NOT inside Shadow DOM)</h2>

  <!-- Using custom component -->
  <my-card></my-card>
  <my-card></my-card>

  <script>
    class MyCard extends HTMLElement {
      constructor() {
        super();

        // 1. Create Shadow DOM
        const shadow = this.attachShadow({ mode: "open" });

        // 2. Add HTML + CSS inside Shadow DOM
        shadow.innerHTML = `
          <style>
            .card {
              border: 2px solid black;
              padding: 15px;
              width: 200px;
              margin: 10px;
              border-radius: 10px;
              font-family: Arial;
              background: #f9f9f9;
            }

            h3 {
              color: ;
              margin: 0;
            }

            p {
              color: gray;
            }

            button {
              margin-top: 10px;
              padding: 5px 10px;
              cursor: pointer;
            }
          </style>

          <div class="card">
            <h3>Hello Shadow DOM</h3>
            <p>This content is inside Shadow DOM</p>
            <button>Click Me</button>
          </div>
        `;
      }
    }

    // 3. Register custom element
    customElements.define("my-card", MyCard);
  </script>

</body>

</html>
