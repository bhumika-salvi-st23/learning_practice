<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            text-align: center;
            color: rgb(44, 41, 41);
        }

        td,
        th {
            border: 1px solid rgb(0, 0, 0);
            padding: 10px;
        }

        tr:nth-child(odd) {
            background-color: #beb6b6;
        }
    </style>
</head>

<body>
    <table>
        <tr >
            <th>Name</th>
            <th>Age</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td>Bhumika</td>
            <td>19</td>
            <td>45</td>
        </tr>
        <tr>
            <td>kajal</td>
            <td>18</td>
            <td>47</td>
        </tr>
        <tr>
            <td>sakshi</td>
            <td>20</td>
            <td>76</td>
        </tr>
        <tr>
            <td>jyoti</td>
            <td>21</td>
            <td>61</td>
        </tr>
    </table>

</body>

</html>
